const GOODREADS_SHELF_MAP = { "read": "read", "currently-reading": "reading", "to-read": "toRead" };

function goodreadsRowToBook(row) {
  const rawShelf = (row["Exclusive Shelf"] || "").trim().toLowerCase();
  const shelf = GOODREADS_SHELF_MAP[rawShelf] || "toRead";
  const totalPages = parseInt(row["Number of Pages"], 10) || 0;
  const rating = parseInt(row["My Rating"], 10) || 0;
  const ownedCopies = parseInt(row["Owned Copies"], 10) || 0;
  const dateAdded = (row["Date Added"] || "").trim() || todayStr();
  const dateFinished = (row["Date Read"] || "").trim() || null;
  return {
    id: uid(),
    title: (row["Title"] || "Untitled").trim(),
    author: (row["Author"] || "").trim(),
    shelf,
    owned: ownedCopies > 0,
    totalPages,
    currentPage: shelf === "read" ? totalPages : 0,
    rating,
    dateAdded,
    dateStarted: shelf === "reading" ? dateAdded : null,
    dateFinished: shelf === "read" ? dateFinished : null,
    log: [],
  };
}

function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function yearOf(dateStr) { return dateStr ? Number(dateStr.slice(0, 4)) : null; }
function daysInMonth(year, monthIdx) { return new Date(year, monthIdx + 1, 0).getDate(); }
function firstWeekday(year, monthIdx) { return new Date(year, monthIdx, 1).getDay(); }

function Stamp({ children, tone = "red" }) {
  const colors = { red: { border: "#A63A2C", color: "#A63A2C" }, navy: { border: "#1F3B57", color: "#1F3B57" }, gold: { border: "#8C6D1F", color: "#8C6D1F" } };
  const c = colors[tone];
  return (
    <span style={{ fontFamily: "'Special Elite', monospace", fontSize: "10px", letterSpacing: "0.12em", color: c.color, border: `2px solid ${c.border}`, borderRadius: "3px", padding: "2px 7px", display: "inline-block", transform: "rotate(-3deg)", opacity: 0.85, textTransform: "uppercase", whiteSpace: "nowrap" }}>
      {children}
    </span>
  );
}

function ProgressBar({ current, total, tone = "#1F3B57" }) {
  const pct = total > 0 ? Math.min(100, Math.round((current / total) * 100)) : 0;
  return (
    <div>
      <div style={{ background: "#E4D9BE", borderRadius: "2px", height: "8px", overflow: "hidden", border: "1px solid #9C8563" }}>
        <div style={{ width: `${pct}%`, background: tone, height: "100%", transition: "width 0.4s ease" }} />
      </div>
      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "11px", color: "#5A5040", marginTop: "4px" }}>
        {total > 0 ? `${current} / ${total} pages · ${pct}%` : "no page count set"}
      </div>
    </div>
  );
}

function Stars({ rating, onRate }) {
  return (
    <div style={{ display: "flex", gap: "2px" }}>
      {[1, 2, 3, 4, 5].map((n) => (
        <span key={n} style={{ cursor: onRate ? "pointer" : "default", color: "#C7A756" }} onClick={() => onRate && onRate(n === rating ? 0 : n)}>
          <StarIcon size={15} filled={n <= (rating || 0)} />
        </span>
      ))}
    </div>
  );
}

function computeDailyPages(log) {
  const map = {};
  log.forEach((entry, i) => {
    const prevPage = i > 0 ? log[i - 1].page : 0;
    map[entry.date] = (map[entry.date] || 0) + Math.max(0, entry.page - prevPage);
  });
  return map;
}

function aggregateDailyPages(books) {
  const combined = {};
  books.forEach((b) => {
    const perBook = computeDailyPages(b.log);
    Object.entries(perBook).forEach(([date, pages]) => { combined[date] = (combined[date] || 0) + pages; });
  });
  return combined;
}

function MonthCalendar({ dailyPagesMap, monthDate, setMonthDate }) {
  const year = monthDate.getFullYear();
  const monthIdx = monthDate.getMonth();
  const total = daysInMonth(year, monthIdx);
  const startWeekday = firstWeekday(year, monthIdx);
  const logByDate = dailyPagesMap;
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= total; d++) cells.push(d);

  return (
    <div style={{ background: "#F2ECDD", border: "1px solid #9C8563", borderRadius: "4px", padding: "10px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "8px" }}>
        <button onClick={() => setMonthDate(new Date(year, monthIdx - 1, 1))} style={{ background: "none", border: "none", cursor: "pointer", color: "#1F3B57" }} aria-label="Previous month"><ChevronLeftIcon size={16} /></button>
        <div style={{ fontFamily: "'Special Elite', monospace", fontSize: "12px", color: "#262220", letterSpacing: "0.05em" }}>{MONTH_NAMES[monthIdx]} {year}</div>
        <button onClick={() => setMonthDate(new Date(year, monthIdx + 1, 1))} style={{ background: "none", border: "none", cursor: "pointer", color: "#1F3B57" }} aria-label="Next month"><ChevronRightIcon size={16} /></button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: "3px", fontFamily: "'IBM Plex Mono', monospace" }}>
        {["S", "M", "T", "W", "T", "F", "S"].map((d, i) => <div key={i} style={{ fontSize: "9px", textAlign: "center", color: "#8C7A5C" }}>{d}</div>)}
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const dateStr = `${year}-${String(monthIdx + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
          const pages = logByDate[dateStr];
          return (
            <div key={i} title={pages ? `${pages} pages read` : ""} style={{ aspectRatio: "1", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "9px", borderRadius: "2px", border: "1px solid #C9BC9C", background: pages ? "#1F3B57" : "transparent", color: pages ? "#F2ECDD" : "#8C7A5C" }}>
              {d}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(38,34,32,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50, padding: "16px" }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "#FBF8F0", border: "1px solid #9C8563", borderRadius: "6px", padding: "22px", width: "100%", maxWidth: "420px", maxHeight: "88vh", overflowY: "auto", boxShadow: "0 12px 32px rgba(0,0,0,0.25)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
          <h3 style={{ fontFamily: "'Special Elite', monospace", fontSize: "15px", color: "#262220", margin: 0 }}>{title}</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "#8C7A5C" }}><XIcon size={18} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

const labelStyle = { fontFamily: "'IBM Plex Mono', monospace", fontSize: "10px", color: "#8C7A5C", textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: "4px" };
const btnPrimary = { fontFamily: "'Special Elite', monospace", fontSize: "12px", letterSpacing: "0.05em", textTransform: "uppercase", background: "#1F3B57", color: "#F2ECDD", border: "none", borderRadius: "3px", padding: "9px 16px", cursor: "pointer" };
const btnGhost = { fontFamily: "'Special Elite', monospace", fontSize: "12px", letterSpacing: "0.05em", textTransform: "uppercase", background: "transparent", color: "#1F3B57", border: "1px solid #1F3B57", borderRadius: "3px", padding: "9px 16px", cursor: "pointer" };

function AddBookModal({ onClose, onSave }) {
  const [title, setTitle] = useState("");
  const [author, setAuthor] = useState("");
  const [shelf, setShelf] = useState("toRead");
  const [owned, setOwned] = useState(false);
  const [totalPages, setTotalPages] = useState("");
  const [suggestions, setSuggestions] = useState([]);
  const [showSuggestions, setShowSuggestions] = useState(false);
  const suppressNextSearch = useRef(false);

  useEffect(() => {
    if (suppressNextSearch.current) { suppressNextSearch.current = false; return; }
    const q = title.trim().toLowerCase();
    if (q.length < 2) { setSuggestions([]); setShowSuggestions(false); return; }
    const matches = BOOK_LIBRARY.filter(([t, a]) => t.toLowerCase().includes(q) || a.toLowerCase().includes(q)).slice(0, 6);
    setSuggestions(matches);
    setShowSuggestions(matches.length > 0);
  }, [title]);

  function pickSuggestion([t, a, pages]) {
    suppressNextSearch.current = true;
    setTitle(t); setAuthor(a); setTotalPages(String(pages));
    setShowSuggestions(false); setSuggestions([]);
  }

  return (
    <Modal title="New Card" onClose={onClose}>
      <label style={labelStyle}>Title</label>
      <div style={{ position: "relative", marginBottom: showSuggestions && suggestions.length ? "0" : "12px" }}>
        <input style={{ ...inputStyle, marginBottom: 0 }} value={title} onChange={(e) => setTitle(e.target.value)} onFocus={() => { if (suggestions.length) setShowSuggestions(true); }} placeholder="Start typing a book title…" autoComplete="off" />
        {showSuggestions && suggestions.length > 0 && (
          <div style={{ border: "1px solid #9C8563", borderTop: "none", borderRadius: "0 0 3px 3px", background: "#FBF8F0", maxHeight: "180px", overflowY: "auto", marginBottom: "12px" }}>
            {suggestions.map(([t, a, pages], i) => (
              <div key={i} onClick={() => pickSuggestion([t, a, pages])} style={{ padding: "7px 10px", cursor: "pointer", fontSize: "13px", color: "#262220", borderBottom: i < suggestions.length - 1 ? "1px solid #E4D9BE" : "none" }} onMouseDown={(e) => e.preventDefault()}>
                <div style={{ fontFamily: "'Source Serif 4', serif", fontWeight: 600 }}>{t}</div>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "10px", color: "#8C7A5C" }}>{a} · {pages}p</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <label style={labelStyle}>Author</label>
      <input style={inputStyle} value={author} onChange={(e) => setAuthor(e.target.value)} placeholder="Author name" />
      <label style={labelStyle}>Shelf</label>
      <select style={inputStyle} value={shelf} onChange={(e) => setShelf(e.target.value)}>
        {SHELVES.map((s) => <option key={s.id} value={s.id}>{s.label}</option>)}
      </select>
      <label style={labelStyle}>Total pages</label>
      <input style={inputStyle} type="number" min="0" value={totalPages} onChange={(e) => setTotalPages(e.target.value)} placeholder="e.g. 320" />
      <label style={{ ...labelStyle, display: "flex", alignItems: "center", gap: "6px", cursor: "pointer" }}>
        <input type="checkbox" checked={owned} onChange={(e) => setOwned(e.target.checked)} /> I own a copy of this book
      </label>
      <div style={{ display: "flex", gap: "8px", marginTop: "14px", justifyContent: "flex-end" }}>
        <button style={btnGhost} onClick={onClose}>Cancel</button>
        <button style={btnPrimary} onClick={() => {
          if (!title.trim()) return;
          onSave({ id: uid(), title: title.trim(), author: author.trim(), shelf, owned, totalPages: totalPages ? Number(totalPages) : 0, currentPage: 0, rating: 0, dateAdded: todayStr(), dateStarted: shelf === "reading" ? todayStr() : null, dateFinished: shelf === "read" ? todayStr() : null, log: [] });
          onClose();
        }}>Add to shelf</button>
      </div>
    </Modal>
  );
}

function LogReadingModal({ book, onClose, onSave }) {
  const [date, setDate] = useState(todayStr());
  const [page, setPage] = useState(book.currentPage || "");
  return (
    <Modal title={`Log Reading — ${book.title}`} onClose={onClose}>
      <label style={labelStyle}>Date</label>
      <input style={inputStyle} type="date" value={date} onChange={(e) => setDate(e.target.value)} max={todayStr()} />
      <label style={labelStyle}>Page you reached</label>
      <input style={inputStyle} type="number" min="0" max={book.totalPages || undefined} value={page} onChange={(e) => setPage(e.target.value)} placeholder="e.g. 145" />
      <div style={{ display: "flex", gap: "8px", marginTop: "14px", justifyContent: "flex-end" }}>
        <button style={btnGhost} onClick={onClose}>Cancel</button>
        <button style={btnPrimary} onClick={() => {
          const p = Number(page);
          if (!page || isNaN(p)) return;
          onSave(date, p); onClose();
        }}>Save entry</button>
      </div>
    </Modal>
  );
}

function BookCard({ book, onUpdate, onDelete, onLog }) {
  const [showCalendar, setShowCalendar] = useState(false);
  const [monthDate, setMonthDate] = useState(new Date());
  const [showLog, setShowLog] = useState(false);

  return (
    <div style={{ background: "#FBF8F0", border: "1px solid #9C8563", borderRadius: "4px", padding: "14px", boxShadow: "2px 2px 0 rgba(156,133,99,0.25)", display: "flex", flexDirection: "column", gap: "8px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px" }}>
        <div>
          <div style={{ fontFamily: "'Source Serif 4', serif", fontWeight: 600, fontSize: "15px", color: "#262220" }}>{book.title}</div>
          <div style={{ fontFamily: "'Source Serif 4', serif", fontSize: "12px", color: "#5A5040", fontStyle: "italic" }}>{book.author || "Unknown author"}</div>
        </div>
        <button onClick={() => onDelete(book.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#B8A88A" }} aria-label="Remove"><TrashIcon size={14} /></button>
      </div>

      <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
        <Stamp tone={book.owned ? "red" : "navy"}>{book.owned ? "Owned" : "Wishlist"}</Stamp>
        {book.shelf === "read" && book.dateFinished && <Stamp tone="gold">Finished {book.dateFinished}</Stamp>}
      </div>

      {book.shelf === "reading" && (
        <>
          <ProgressBar current={book.currentPage} total={book.totalPages} />
          <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
            <button style={btnGhost} onClick={() => setShowLog(true)}>Log today's reading</button>
            <button style={btnGhost} onClick={() => setShowCalendar((v) => !v)}>{showCalendar ? "Hide" : "Show"} calendar</button>
            <button style={btnPrimary} onClick={() => onUpdate({ ...book, shelf: "read", dateFinished: todayStr(), currentPage: book.totalPages || book.currentPage })}>Mark finished</button>
          </div>
          {showCalendar && <MonthCalendar dailyPagesMap={computeDailyPages(book.log)} monthDate={monthDate} setMonthDate={setMonthDate} />}
        </>
      )}

      {book.shelf === "read" && (
        <div>
          <div style={{ ...labelStyle, marginBottom: "6px" }}>Your rating</div>
          <Stars rating={book.rating} onRate={(r) => onUpdate({ ...book, rating: r })} />
        </div>
      )}

      {book.shelf === "toRead" && (
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
          <button style={{ ...labelStyle, cursor: "pointer", border: "1px solid #9C8563", borderRadius: "3px", padding: "6px 10px", background: "#F2ECDD" }} onClick={() => onUpdate({ ...book, owned: !book.owned })}>{book.owned ? "Mark not owned" : "Mark owned"}</button>
          <button style={btnPrimary} onClick={() => onUpdate({ ...book, shelf: "reading", dateStarted: todayStr() })}>Start reading</button>
        </div>
      )}

      {showLog && <LogReadingModal book={book} onClose={() => setShowLog(false)} onSave={(date, page) => onLog(book.id, date, page)} />}
    </div>
  );
}

function App() {
  const [books, setBooks] = useState([]);
  const [goals, setGoals] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [activeShelf, setActiveShelf] = useState("reading");
  const [showAdd, setShowAdd] = useState(false);
  const [editingGoal, setEditingGoal] = useState(false);
  const [goalInput, setGoalInput] = useState("");
  const [activityMonth, setActivityMonth] = useState(new Date());
  const [importMessage, setImportMessage] = useState(null);
  const currentYear = new Date().getFullYear();

  useEffect(() => {
    try {
      const raw = window.localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        setBooks(parsed.books || []);
        setGoals(parsed.goals || {});
      }
    } catch (e) { /* no existing data yet */ }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try {
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify({ books, goals }));
    } catch (e) { console.error("Failed to save", e); }
  }, [books, goals, loaded]);

  function addBook(book) { setBooks((prev) => [...prev, book]); }
  function updateBook(updated) { setBooks((prev) => prev.map((b) => (b.id === updated.id ? updated : b))); }
  function deleteBook(id) { setBooks((prev) => prev.filter((b) => b.id !== id)); }
  function logReading(id, date, page) {
    setBooks((prev) => prev.map((b) => {
      if (b.id !== id) return b;
      const log = [...b.log.filter((e) => e.date !== date), { date, page }].sort((a, c) => a.date.localeCompare(c.date));
      return { ...b, log, currentPage: page };
    }));
  }

  function handleImportFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    Papa.parse(file, {
      header: true, skipEmptyLines: true,
      complete: (results) => {
        const existingKeys = new Set(books.map((b) => `${b.title.toLowerCase()}|${b.author.toLowerCase()}`));
        const imported = [];
        results.data.forEach((row) => {
          if (!row["Title"]) return;
          const book = goodreadsRowToBook(row);
          const key = `${book.title.toLowerCase()}|${book.author.toLowerCase()}`;
          if (existingKeys.has(key)) return;
          existingKeys.add(key); imported.push(book);
        });
        setBooks((prev) => [...prev, ...imported]);
        setImportMessage(`Imported ${imported.length} book${imported.length === 1 ? "" : "s"} from Goodreads.`);
        setTimeout(() => setImportMessage(null), 5000);
      },
      error: () => {
        setImportMessage("Couldn't read that file — make sure it's the Goodreads export CSV.");
        setTimeout(() => setImportMessage(null), 5000);
      },
    });
    e.target.value = "";
  }

  function handleExportData() {
    const blob = new Blob([JSON.stringify({ books, goals }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `reading-log-backup-${todayStr()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function handleImportBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const parsed = JSON.parse(evt.target.result);
        setBooks(parsed.books || []);
        setGoals(parsed.goals || {});
        setImportMessage("Backup restored successfully.");
      } catch (err) {
        setImportMessage("Couldn't read that backup file.");
      }
      setTimeout(() => setImportMessage(null), 5000);
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  const goalTarget = goals[currentYear] || 0;
  const booksReadThisYear = books.filter((b) => b.shelf === "read" && yearOf(b.dateFinished) === currentYear).length;
  const shelfCounts = SHELVES.reduce((acc, s) => { acc[s.id] = books.filter((b) => b.shelf === s.id).length; return acc; }, {});
  const visibleBooks = books.filter((b) => b.shelf === activeShelf);

  const aggregatedDailyPages = aggregateDailyPages(books);
  const activityYear = activityMonth.getFullYear();
  const activityMonthIdx = activityMonth.getMonth();
  const monthPrefix = `${activityYear}-${String(activityMonthIdx + 1).padStart(2, "0")}`;
  const monthEntries = Object.entries(aggregatedDailyPages).filter(([date]) => date.startsWith(monthPrefix));
  const daysReadThisMonth = monthEntries.length;
  const pagesReadThisMonth = monthEntries.reduce((sum, [, pages]) => sum + pages, 0);
  const avgPagesPerActiveDay = daysReadThisMonth > 0 ? Math.round(pagesReadThisMonth / daysReadThisMonth) : 0;

  const goodreadsInputRef = useRef(null);
  const backupInputRef = useRef(null);

  return (
    <div style={{ minHeight: "100vh", background: "#EDE6D6", fontFamily: "'Source Serif 4', serif", padding: "24px 16px 60px", boxSizing: "border-box" }}>
      <div style={{ maxWidth: "760px", margin: "0 auto" }}>
        <header style={{ textAlign: "center", marginBottom: "24px" }}>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "10px", letterSpacing: "0.2em", color: "#8C7A5C", textTransform: "uppercase" }}>Personal Catalog</div>
          <h1 style={{ fontFamily: "'Special Elite', monospace", fontSize: "clamp(24px, 5vw, 32px)", color: "#262220", margin: "6px 0" }}>The Reading Log</h1>
        </header>

        <div style={{ display: "flex", gap: "6px", marginBottom: "18px", flexWrap: "wrap" }}>
          {SHELVES.map((s) => (
            <button key={s.id} onClick={() => setActiveShelf(s.id)} style={{ fontFamily: "'Special Elite', monospace", fontSize: "11px", letterSpacing: "0.05em", textTransform: "uppercase", padding: "9px 14px", borderRadius: "3px 3px 0 0", cursor: "pointer", border: "1px solid #9C8563", borderBottom: activeShelf === s.id ? "1px solid #F2ECDD" : "1px solid #9C8563", background: activeShelf === s.id ? "#F2ECDD" : "#DCD0B4", color: "#262220", position: "relative", top: "1px" }}>
              {s.label} ({shelfCounts[s.id] || 0})
            </button>
          ))}
        </div>

        {visibleBooks.length === 0 ? (
          <div style={{ textAlign: "center", padding: "40px 20px", color: "#8C7A5C", border: "1px dashed #9C8563", borderRadius: "4px", marginBottom: "22px" }}>
            <BookOpenIcon size={22} style={{ marginBottom: "8px" }} />
            <div style={{ fontSize: "13px" }}>No cards in this drawer yet. Add a book to get started.</div>
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: "14px", marginBottom: "22px" }}>
            {visibleBooks.map((b) => <BookCard key={b.id} book={b} onUpdate={updateBook} onDelete={deleteBook} onLog={logReading} />)}
          </div>
        )}

        <section style={{ background: "#FBF8F0", border: "1px solid #9C8563", borderRadius: "4px", padding: "16px 18px", marginBottom: "22px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "12px" }}>
          <div>
            <div style={labelStyle}>{currentYear} Reading Goal</div>
            {goalTarget > 0 ? (
              <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "13px", color: "#262220" }}>{booksReadThisYear} of {goalTarget} books · {Math.min(100, Math.round((booksReadThisYear / goalTarget) * 100))}%</div>
            ) : (
              <div style={{ fontSize: "13px", color: "#8C7A5C" }}>No goal set yet</div>
            )}
          </div>
          {goalTarget > 0 && (
            <div style={{ flex: "1 1 160px", maxWidth: "220px" }}><ProgressBar current={booksReadThisYear} total={goalTarget} tone="#A63A2C" /></div>
          )}
          <button style={btnGhost} onClick={() => { setGoalInput(String(goalTarget || "")); setEditingGoal(true); }}>{goalTarget > 0 ? "Edit goal" : "Set goal"}</button>
        </section>

        <section style={{ background: "#FBF8F0", border: "1px solid #9C8563", borderRadius: "4px", padding: "16px 18px", marginBottom: "22px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "10px", flexWrap: "wrap", gap: "8px" }}>
            <div style={labelStyle}>Monthly Reading Activity</div>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px", color: "#262220" }}>
              {daysReadThisMonth} day{daysReadThisMonth === 1 ? "" : "s"} read · {pagesReadThisMonth} pages{daysReadThisMonth > 0 ? ` · avg ${avgPagesPerActiveDay}/day` : ""}
            </div>
          </div>
          <MonthCalendar dailyPagesMap={aggregatedDailyPages} monthDate={activityMonth} setMonthDate={setActivityMonth} />
        </section>

        <button onClick={() => setShowAdd(true)} style={{ position: "fixed", bottom: "22px", right: "22px", background: "#1F3B57", color: "#F2ECDD", border: "none", borderRadius: "50%", width: "52px", height: "52px", cursor: "pointer", boxShadow: "0 4px 14px rgba(0,0,0,0.3)", display: "flex", alignItems: "center", justifyContent: "center" }} aria-label="Add book">
          <PlusIcon size={22} />
        </button>

        <footer style={{ textAlign: "center", marginTop: "36px", paddingTop: "18px", borderTop: "1px dashed #9C8563", display: "flex", flexDirection: "column", alignItems: "center", gap: "10px" }}>
          <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", justifyContent: "center" }}>
            <button onClick={() => goodreadsInputRef.current && goodreadsInputRef.current.click()} style={{ ...btnGhost, display: "inline-flex", alignItems: "center", gap: "6px" }}>
              <UploadIcon size={13} /> Import from Goodreads CSV
            </button>
            <button onClick={handleExportData} style={{ ...btnGhost, display: "inline-flex", alignItems: "center", gap: "6px" }}>
              <DownloadIcon size={13} /> Export backup
            </button>
            <button onClick={() => backupInputRef.current && backupInputRef.current.click()} style={{ ...btnGhost, display: "inline-flex", alignItems: "center", gap: "6px" }}>
              <UploadIcon size={13} /> Restore backup
            </button>
          </div>
          <input ref={goodreadsInputRef} type="file" accept=".csv" onChange={handleImportFile} style={{ display: "none" }} />
          <input ref={backupInputRef} type="file" accept=".json" onChange={handleImportBackup} style={{ display: "none" }} />
          {importMessage && <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "11px", color: "#1F3B57" }}>{importMessage}</div>}
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "9px", color: "#B8A88A" }}>Your data is stored only on this device's browser.</div>
        </footer>
      </div>

      {showAdd && <AddBookModal onClose={() => setShowAdd(false)} onSave={addBook} />}

      {editingGoal && (
        <Modal title={`Set ${currentYear} Goal`} onClose={() => setEditingGoal(false)}>
          <label style={labelStyle}>Number of books</label>
          <input style={inputStyle} type="number" min="0" value={goalInput} onChange={(e) => setGoalInput(e.target.value)} placeholder="e.g. 24" />
          <div style={{ display: "flex", gap: "8px", justifyContent: "flex-end" }}>
            <button style={btnGhost} onClick={() => setEditingGoal(false)}>Cancel</button>
            <button style={btnPrimary} onClick={() => { setGoals((prev) => ({ ...prev, [currentYear]: Number(goalInput) || 0 })); setEditingGoal(false); }}>
              <CheckIcon size={13} style={{ marginRight: "4px", verticalAlign: "middle" }} /> Save
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

  var src = document.getElementById("app-source").textContent;
  var output = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
  var s = document.createElement("script");
  s.text = output;
  document.body.appendChild(s);
</script>
</body>
